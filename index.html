<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pregador Bíblico</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E7D32">

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#2E7D32;
}

.botao{

display:block;
width:260px;
margin:15px auto;
padding:15px;
background:#2E7D32;
color:white;
text-decoration:none;
border-radius:8px;
font-size:18px;

}

input{

width:80%;
padding:12px;
font-size:16px;
margin-top:10px;

}

button{

padding:12px 25px;
font-size:16px;
background:#2E7D32;
color:white;
border:none;
border-radius:6px;
margin-top:10px;

}

#resultado{

margin-top:25px;
background:white;
padding:20px;
border-radius:10px;
text-align:left;

}

</style>

</head>

<body>

<h1>📖 Pregador Bíblico</h1>

<p>Ferramenta para pregadores e estudantes da Palavra</p>

<a class="botao" href="https://www.biblegateway.com/" target="_blank">
📖 Bíblia Online
</a>

<a class="botao" href="https://drive.google.com/drive/folders/1Y5Fj-6FhbAjjBqxjhzAAWKv77iiXs5nM" target="_blank">
📚 Biblioteca Bíblica
</a>

<hr>

<h2>🤖 Gerador de Sermões com IA</h2>

<input type="text" id="tema" placeholder="Digite o tema ou versículo">

<br>

<button onclick="gerarSermaoIA()">
Gerar Sermão
</button>

<div id="resultado"></div>

<script>

async function gerarSermaoIA(){

let tema = document.getElementById("tema").value;

document.getElementById("resultado").innerHTML = "Gerando sermão...";

try{

const resposta = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer SUA_API_KEY_AQUI"
},

body: JSON.stringify({

model:"gpt-4o-mini",

messages:[

{
role:"system",
content:"Você é um teólogo especialista em Bíblia que escreve sermões profundos, expositivos e pastorais."
},

{
role:"user",
content:`Crie um sermão profundo sobre ${tema}. Inclua introdução, contexto histórico, três pontos expositivos, aplicações práticas e conclusão pastoral.`
}

]

})

});

const dados = await resposta.json();

document.getElementById("resultado").innerHTML =
dados.choices[0].message.content;

}catch(erro){

document.getElementById("resultado").innerHTML =
"Erro ao gerar sermão.";

}

}

</script>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>

</html>
