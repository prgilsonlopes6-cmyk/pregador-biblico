<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pregador Bíblico</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E7D32">

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

h1{
color:#2E7D32;
}

.botao{

display:block;
width:260px;
margin:15px auto;
padding:15px;
background:#2E7D32;
color:white;
text-decoration:none;
border-radius:8px;
font-size:18px;

}

input{

width:80%;
padding:12px;
margin-top:10px;
font-size:16px;

}

button{

padding:12px 25px;
background:#2E7D32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
margin-top:10px;

}

#resultado{

margin-top:25px;
text-align:left;
background:white;
padding:25px;
border-radius:10px;

}

</style>

</head>

<body>

<h1>📖 Pregador Bíblico</h1>

<p>Ferramenta avançada para estudo das Escrituras</p>

<a class="botao" href="https://www.biblegateway.com/" target="_blank">
📖 Bíblia Online
</a>

<a class="botao" href="https://drive.google.com/drive/folders/1Y5Fj-6FhbAjjBqxjhzAAWKv77iiXs5nM" target="_blank">
📚 Biblioteca Bíblica
</a>

<hr>

<h2>🤖 Gerador de Sermões Profundos</h2>

<input type="text" id="tema" placeholder="Digite o tema ou versículo bíblico">

<br>

<button onclick="gerarSermao()">
Gerar Sermão
</button>

<div id="resultado"></div>

<script>

function gerarSermao(){

let tema = document.getElementById("tema").value;

let sermao = `

<h2>📖 Sermão: ${tema}</h2>

<h3>Texto Base</h3>
A mensagem de hoje está fundamentada na reflexão sobre ${tema}, um tema central para a vida cristã.

<h3>Introdução</h3>
Desde os tempos bíblicos, Deus tem revelado Sua vontade através das Escrituras. 
Ao meditarmos sobre ${tema}, somos convidados a compreender a profundidade da revelação divina e o propósito de Deus para nossas vidas.

<h3>Contexto Histórico</h3>
Cada passagem bíblica foi escrita dentro de um contexto histórico específico. 
Compreender o ambiente cultural e espiritual da época nos ajuda a interpretar corretamente a mensagem de Deus.

<h3>Ponto 1 — A Revelação de Deus</h3>
Deus se revela ao homem através da Sua Palavra. 
Quando nos aproximamos das Escrituras com humildade, encontramos direção, sabedoria e transformação.

<h3>Ponto 2 — A Transformação Espiritual</h3>
A Palavra de Deus possui poder transformador. 
Ela renova a mente, fortalece a fé e conduz o cristão a uma vida de santidade.

<h3>Ponto 3 — A Prática da Palavra</h3>
O verdadeiro conhecimento bíblico deve resultar em prática diária. 
O cristão é chamado a viver os ensinamentos de Cristo em todas as áreas da vida.

<h3>Aplicações Práticas</h3>

✔ buscar intimidade com Deus através da oração  
✔ meditar diariamente nas Escrituras  
✔ viver os princípios bíblicos no cotidiano  
✔ testemunhar a fé através das atitudes  

<h3>Conclusão</h3>
A reflexão sobre ${tema} nos lembra que Deus continua falando ao seu povo através da Sua Palavra. 
Quando obedecemos às Escrituras, experimentamos transformação espiritual e crescimento na fé.

<h3>Oração Final</h3>
Senhor Deus, ajuda-nos a compreender profundamente a Tua Palavra. 
Que possamos viver segundo os teus ensinamentos e manifestar a tua verdade ao mundo. Amém.

`;

document.getElementById("resultado").innerHTML = sermao;

}

</script>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>

</html>
