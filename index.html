<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pregador Bíblico</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8B0000">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
text-align:center;
}

header{
background:#8B0000;
padding:20px;
font-size:24px;
font-weight:bold;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

button{
padding:18px;
font-size:16px;
border:none;
border-radius:12px;
background:#d4af37;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#f1d56b;
}

#conteudo{
margin:20px;
padding:20px;
background:#222;
border-radius:10px;
}

footer{
margin-top:30px;
padding:15px;
font-size:14px;
}

</style>

</head>

<body>

<header>
📖 Pregador Bíblico
</header>

<div class="menu">

<button onclick="abrir('https://chatgpt.com/g/g-cHX2S8Qjy-comentario-biblico-completo-do-pregador')">
🤖 Gerador de Sermões
</button>

<button onclick="abrir('https://drive.google.com/drive/folders/1Y5Fj-6FhbAjjBqxjhzAAWKv77iiXs5nM')">
📚 Biblioteca Cristã
</button>

<button onclick="abrir('https://www.blueletterbible.org/')">
📖 Bíblia Strong
</button>

<button onclick="abrir('https://www.bible.is/')">
🔊 Bíblia em Áudio
</button>

<button onclick="devocional()">
🙏 Devocional Diário
</button>

<button onclick="quiz()">
🧠 Quiz Bíblico
</button>

</div>

<div id="conteudo">
Bem-vindo ao aplicativo Pregador Bíblico
</div>

<footer>
Autor: Pastor Gilson Lopes
</footer>

<script>

function abrir(link){
window.open(link,'_blank')
}

function devocional(){

const versiculos = [

"Salmos 119:105 - Lâmpada para os meus pés é a tua palavra.",
"João 8:32 - Conhecereis a verdade e a verdade vos libertará.",
"Romanos 12:2 - Transformai-vos pela renovação da mente.",
"Josué 1:9 - Sê forte e corajoso.",
"Salmos 23:1 - O Senhor é meu pastor e nada me faltará.",
"Filipenses 4:13 - Posso todas as coisas naquele que me fortalece.",
"Provérbios 3:5 - Confia no Senhor de todo coração.",
"Mateus 11:28 - Vinde a mim todos que estais cansados."

]

let v = versiculos[Math.floor(Math.random()*versiculos.length)]

document.getElementById("conteudo").innerHTML =
"<h2>Devocional de Hoje</h2><p>"+v+"</p>"

}

function quiz(){

const perguntas = [

{
p:"Quem construiu a arca?",
r:["Moisés","Noé","Abraão"],
c:1
},

{
p:"Quantos dias choveu no dilúvio?",
r:["30","40","50"],
c:1
},

{
p:"Quem derrotou Golias?",
r:["Davi","Saul","Samuel"],
c:0
},

{
p:"Quem foi lançado na cova dos leões?",
r:["Daniel","José","Elias"],
c:0
}

]

let q = perguntas[Math.floor(Math.random()*perguntas.length)]

let resposta = prompt(

q.p + "\n\n" +
"1 - "+q.r[0]+"\n"+
"2 - "+q.r[1]+"\n"+
"3 - "+q.r[2]

)

if(resposta == q.c+1){

alert("✅ Resposta correta!")

}else{

alert("❌ Resposta errada!")

}

}

</script>

</body>
</html>
