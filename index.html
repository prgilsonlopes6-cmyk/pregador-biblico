<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pregador Bíblico</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E7D32">

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

h1{
color:#2E7D32;
}

.botao{

display:block;
width:250px;
margin:15px auto;
padding:15px;
background:#2E7D32;
color:white;
text-decoration:none;
border-radius:8px;
font-size:18px;

}

input{

width:80%;
padding:10px;
margin-top:10px;
}

button{

padding:12px 20px;
background:#2E7D32;
color:white;
border:none;
border-radius:5px;
margin-top:10px;
font-size:16px;

}

#resultado{

margin-top:20px;
text-align:left;
background:white;
padding:20px;
border-radius:8px;

}

</style>

</head>

<body>

<h1>📖 Pregador Bíblico</h1>

<p>Ferramenta de estudo profundo das Escrituras</p>

<a class="botao" href="https://www.biblegateway.com/" target="_blank">
📖 Bíblia Strong
</a>

<a class="botao" href="https://drive.google.com/drive/folders/1Y5Fj-6FhbAjjBqxjhzAAWKv77iiXs5nM" target="_blank">
📚 Biblioteca Bíblica
</a>

<hr>

<h2>🤖 Gerador de Sermões</h2>

<input type="text" id="tema" placeholder="Digite o tema ou versículo">

<br>

<button onclick="gerarSermao()">
Gerar Sermão
</button>

<div id="resultado"></div>

<script>

function gerarSermao(){

let tema = document.getElementById("tema").value;

let sermao = `

<h2>Sermão: ${tema}</h2>

<h3>📜 Introdução</h3>
A Palavra de Deus nos convida a refletir profundamente sobre ${tema}. 
A Bíblia revela que Deus deseja falar ao coração do seu povo através das Escrituras.

<h3>📖 Contexto Bíblico</h3>
Ao examinarmos este tema nas Escrituras, percebemos que Deus sempre conduziu seu povo através da revelação da verdade divina.

<h3>🔥 Ponto 1 — A Revelação de Deus</h3>
Deus se revela ao homem através da Sua Palavra. O estudo profundo das Escrituras nos aproxima do conhecimento divino.

<h3>🔥 Ponto 2 — A Transformação Espiritual</h3>
A Palavra não apenas informa, mas transforma. Ela muda o coração, a mente e a vida do crente.

<h3>🔥 Ponto 3 — Aplicação para Hoje</h3>
O cristão é chamado a viver os princípios da Palavra no seu dia a dia, manifestando a presença de Deus ao mundo.

<h3>🙏 Conclusão</h3>
Que possamos buscar diariamente a presença de Deus através da leitura, meditação e prática da Sua Palavra.

<h3>🕊 Oração Final</h3>
Senhor Deus, ajuda-nos a compreender profundamente a Tua Palavra e viver segundo os Teus caminhos. Amém.

`;

document.getElementById("resultado").innerHTML = sermao;

}

</script>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>

</html>
