<body>

📖 Pregador Bíblico
</header>

<script>

function abrir(link){
window.open(link,'_blank')
}

const versiculos = [

"João 8:32 - Conhecereis a verdade e a verdade vos libertará.",

"Romanos 12:2 - Transformai-vos pela renovação da mente.",
"Provérbios 3:5 - Confia no Senhor de todo o teu coração."

]

let v = versiculos[Math.floor(Math.random()*versiculos.length)]

alert("Devocional de hoje:\n\n"+v)

}

alert("Aplicativo Pregador Bíblico\n\nAutor: Pastor Gilson Lopes\n\nFerramenta para estudo bíblico, sermões e aprofundamento nas Escrituras.")

}
